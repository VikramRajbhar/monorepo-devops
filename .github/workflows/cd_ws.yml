name: Deploy the websocket 

on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Copy the code
        uses: actions/checkout@v4
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/dockerfile.ws
          push: true
          tags: vikramrajbhar/monorepo-websocket:${{ github.sha }}
      
      - name: Deploy to the VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
          chmod 700 /home/runner/ssh_key
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@98.91.20.188 -t "docker stop user_websocket && docker rm user_websocket && docker run --name user_websocket -d -p 8081:8081 vikramrajbhar/monorepo-websocket:${{ github.sha }}"